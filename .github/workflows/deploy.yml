name: Deploy DixScript Docs to Cloudflare Pages

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write
  pull-requests: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          PUBLIC_CI_BASE: https://mid-d-man.github.io/DixScript-Rust

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Verify build output exists
        run: |
          echo "=== Build output ==="
          ls -la .svelte-kit/ || echo "No .svelte-kit directory"
          ls -la .svelte-kit/cloudflare || echo "No cloudflare output dir"

      - name: Create Pages project if it does not exist
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          wrangler pages project create dixscript-docs --production-branch=main 2>&1 || echo "Project may already exist, continuing"

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          wrangler pages deploy .svelte-kit/cloudflare \
            --project-name=dixscript-docs \
            --branch=main \
            --commit-dirty=true \
            2>&1
