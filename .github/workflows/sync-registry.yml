name: Sync Registry to R2

on:
  push:
    branches: [main, master]
    paths:
      - 'registry/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:

  # ── 1. Check trigger ────────────────────────────────────────────────────────
  parse-trigger:
    runs-on: ubuntu-latest
    outputs:
      run_sync: ${{ steps.decide.outputs.run_sync }}
    steps:
      - name: Decide whether to sync registry
        id: decide
        run: |
          RUN=false

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RUN=true
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            MSG="${{ github.event.pull_request.title }}"
            echo "$MSG" | grep -qiE '\-\-sync-registry\b|\-\-cloudflare\b' && RUN=true || true
          else
            MSG="${{ github.event.head_commit.message }}"
            echo "$MSG" | grep -qiE '\-\-sync-registry\b|\-\-cloudflare\b' && RUN=true || true
          fi

          echo "run_sync=$RUN" >> $GITHUB_OUTPUT
          echo "Run sync: $RUN"

  # ── 2. Upload to R2 ─────────────────────────────────────────────────────────
  sync:
    runs-on: ubuntu-latest
    needs: parse-trigger
    if: needs.parse-trigger.outputs.run_sync == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Upload .mdix files to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "Scanning registry/ folder for .mdix files..."

          if [ ! -d "registry" ]; then
            echo "No registry/ folder found — nothing to upload."
            exit 0
          fi

          FILES=$(find registry -name "*.mdix" -type f)

          if [ -z "$FILES" ]; then
            echo "No .mdix files found in registry/ — nothing to upload."
            exit 0
          fi

          for filepath in $FILES; do
            filename=$(basename "$filepath")
            echo "Uploading $filename → R2 packages/$filename"
            npx wrangler r2 object put "mdix-registry/packages/$filename" \
              --file "$filepath" \
              --content-type "text/plain" \
              --remote
          done

          echo "Done. Files uploaded:"
          echo "$FILES"

  # ── 3. Summary ──────────────────────────────────────────────────────────────
  summary:
    runs-on: ubuntu-latest
    needs: [parse-trigger, sync]
    if: always()
    steps:
      - name: Print summary
        run: |
          echo "================================================="
          echo "  DixScript — Registry Sync Summary"
          echo "================================================="
          echo "Build:   #${{ github.run_number }}"
          echo "Branch:  ${{ github.ref_name }}"
          echo "Trigger: ${{ github.event_name }}"
          echo "Sync:    ${{ needs.sync.result || 'skipped' }}"
          echo ""
          if [ "${{ needs.parse-trigger.outputs.run_sync }}" != "true" ]; then
            echo "Skipped — commit message did not contain --sync-registry or --cloudflare"
            echo "Add either keyword to your commit message to trigger an R2 upload."
          fi
