name: Sync Registry to R2

on:
  push:
    branches: [main, master]
    paths:
      - 'registry/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Upload .mdix files to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "Scanning registry/ folder for .mdix files..."

          if [ ! -d "registry" ]; then
            echo "No registry/ folder found — nothing to upload."
            exit 0
          fi

          FILES=$(find registry -name "*.mdix" -type f)

          if [ -z "$FILES" ]; then
            echo "No .mdix files found in registry/ — nothing to upload."
            exit 0
          fi

          for filepath in $FILES; do
            filename=$(basename "$filepath")
            echo "Uploading $filename → R2 packages/$filename"
            npx wrangler r2 object put packages/$filename \
              --bucket mdix-registry \
              --file "$filepath" \
              --content-type "text/plain" \
              --remote
          done

          echo "Done. Files uploaded:"
          echo "$FILES"
