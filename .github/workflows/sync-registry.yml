name: Sync Registry to R2

on:
  push:
    branches: [main, master]
    paths:
      - 'registry/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:

  parse-trigger:
    runs-on: ubuntu-latest
    outputs:
      run_sync: ${{ steps.decide.outputs.run_sync }}
    steps:
      - name: Decide whether to sync registry
        id: decide
        run: |
          RUN=false
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RUN=true
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            MSG="${{ github.event.pull_request.title }}"
            echo "$MSG" | grep -qiE '\-\-sync-registry\b|\-\-cloudflare\b' && RUN=true || true
          else
            MSG="${{ github.event.head_commit.message }}"
            echo "$MSG" | grep -qiE '\-\-sync-registry\b|\-\-cloudflare\b' && RUN=true || true
          fi
          echo "run_sync=$RUN" >> $GITHUB_OUTPUT
          echo "Run sync: $RUN"

  sync:
    runs-on: ubuntu-latest
    needs: parse-trigger
    if: needs.parse-trigger.outputs.run_sync == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Upload registry files to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "Scanning registry/ for .mdix and .meta.json files..."

          if [ ! -d "registry" ]; then
            echo "No registry/ folder found — nothing to upload."
            exit 0
          fi

          # Find all .mdix files (preserving subdirectory structure)
          MDIX_FILES=$(find registry -name "*.mdix" -type f)
          META_FILES=$(find registry -name "*.meta.json" -type f)

          if [ -z "$MDIX_FILES" ]; then
            echo "No .mdix files found — nothing to upload."
            exit 0
          fi

          # Upload .mdix files
          for filepath in $MDIX_FILES; do
            # Strip leading "registry/" to get relative path
            relpath="${filepath#registry/}"
            r2key="packages/${relpath}"
            echo "Uploading .mdix: $relpath → R2 $r2key"
            npx wrangler r2 object put "mdix-registry/${r2key}" \
              --file "$filepath" \
              --content-type "text/plain" \
              --remote
          done

          # Upload .meta.json files
          for filepath in $META_FILES; do
            relpath="${filepath#registry/}"
            r2key="packages/${relpath}"
            echo "Uploading meta: $relpath → R2 $r2key"
            npx wrangler r2 object put "mdix-registry/${r2key}" \
              --file "$filepath" \
              --content-type "application/json" \
              --remote
          done

          echo "Done."
          echo "MDIX files: $(echo "$MDIX_FILES" | wc -l)"
          echo "Meta files: $(echo "$META_FILES" | wc -l)"

  summary:
    runs-on: ubuntu-latest
    needs: [parse-trigger, sync]
    if: always()
    steps:
      - name: Print summary
        run: |
          echo "================================================="
          echo "  DixScript — Registry Sync Summary"
          echo "================================================="
          echo "Build:   #${{ github.run_number }}"
          echo "Branch:  ${{ github.ref_name }}"
          echo "Trigger: ${{ github.event_name }}"
          echo "Sync:    ${{ needs.sync.result || 'skipped' }}"
          if [ "${{ needs.parse-trigger.outputs.run_sync }}" != "true" ]; then
            echo "Skipped — add --sync-registry or --cloudflare to your commit message."
          fi
